# Builds the `llamppl` environment and runs all tests

name: Codebase tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

concurrency:
  group: gpu-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-gpu-tests') }}
    runs-on:
      group: gpu-runners
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'

      - name: Run Tests
        run: |
            python -m venv venv
            source venv/bin/activate
            pip install -e .[dev,examples,vllm]
            pip install --force-reinstall 'triton==3.2.0'
            # Add the project root to the PYTHONPATH for examples
            PYTHONPATH=$PYTHONPATH:$(pwd) pytest tests --cov=llamppl --cov-report=json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          slug: genlm/llamppl


  test_mlx:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
          cache: 'pip'

      - name: Run tests with MLX extras
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -e .[mlx,dev,examples]
          PYTHONPATH=$PYTHONPATH:$(pwd) pytest tests --cov=llamppl --cov-report=json

      - name: Upload MLX coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.json
          slug: genlm/llamppl

  gpu-gate:
    # The single required status check for GPU tests.
    # Passes when the GPU job succeeds OR is intentionally skipped
    # (skip-gpu-tests label, or non-PR paths); fails on failure/cancelled.
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Require GPU job to pass or be intentionally skipped
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          echo "build=$BUILD_RESULT"
          case "$BUILD_RESULT" in
            success|skipped) ;;
            *) echo "::error::GPU job result '$BUILD_RESULT'. Re-run, or apply the 'skip-gpu-tests' label to merge without GPU CI."; exit 1 ;;
          esac
